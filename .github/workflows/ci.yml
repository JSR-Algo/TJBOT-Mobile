name: Mobile CI

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'babel.config.*'
      - 'app.json'
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'babel.config.*'
      - 'app.json'
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint mobile app
        run: npm run lint

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Run mobile tests
        run: npm test -- --runInBand

  e2e-script-smoke:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify E2E script is runnable
        run: node scripts/e2e-mobile.js --help
