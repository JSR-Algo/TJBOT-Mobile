name: Mobile CI

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'babel.config.*'
      - 'app.json'
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'babel.config.*'
      - 'app.json'
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint mobile app
        run: npm run lint

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Run mobile tests
        run: npm test -- --runInBand

      - name: Validate Expo config
        run: npx expo config --json > /tmp/expo-config.json

  android-native-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build Android debug app
        run: ./gradlew assembleDebug
        working-directory: android

  ios-native-build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Build iOS simulator app
        run: xcodebuild -workspace TbotMobile.xcworkspace -scheme TbotMobile -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 16' build
        working-directory: ios

  eas-config:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate EAS profile config
        run: |
          npx --yes eas-cli@latest --version
          test -f eas.json

