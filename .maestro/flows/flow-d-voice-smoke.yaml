# P0-16 Voice smoke gate — Maestro flow (plan v2 §13.6)
#
# CI smoke gate for X1/X2/X3 cross-platform regression:
#   - One platform doesn't fire voiceMicVadEnd at all
#   - FSM transitions in wrong order
#   - Event types differ between platforms
#
# Prerequisites:
#   - App built with EXPO_PUBLIC_VOICE_TEST_HARNESS=true
#   - Simulator/emulator with microphone permissions granted
#   - Backend running or mocked via EXPO_PUBLIC_API_URL
#
# This flow is NOT a release gate (§13.8 physical-device matrix is).
# It verifies structural FSM correctness on simulators only.

appId: com.tbotmobile
---

# ── Launch and reach the voice screen ───────────────────────────────────

- launchApp:
    clearState: true
    env:
      EXPO_PUBLIC_VOICE_TEST_HARNESS: "true"

- assertVisible:
    text: "TBot"
    timeout: 10000

# Skip onboarding if present
- runFlow:
    when:
      visible: "Get started"
    flow:
      - tapOn: "Get started"
      - waitForAnimationToEnd

# Navigate to voice conversation
- tapOn:
    text: "Start conversation"
    optional: true

- tapOn:
    id: "start-voice-button"
    optional: true

# ── X1: Voice session starts — FSM enters LISTENING ──────────────────────

- assertVisible:
    text: "Listening"
    timeout: 15000

# ── X2: User speaks — FSM transitions to USER_SPEAKING ───────────────────
# In test harness mode the app reads from a pre-recorded PCM file
# injected via the test backend; on simulator we verify the UI state change.

- assertVisible:
    text: "Hearing you"
    timeout: 10000
    optional: true

# ── X3: AI responds — FSM transitions through WAITING_AI → ASSISTANT_SPEAKING

- assertVisible:
    text: "Speaking"
    timeout: 15000
    optional: true

# ── Verify session can be stopped cleanly ───────────────────────────────

- tapOn:
    id: "stop-voice-button"
    optional: true

- tapOn:
    text: "Stop"
    optional: true

- assertNotVisible:
    text: "Speaking"
    timeout: 5000
    optional: true
